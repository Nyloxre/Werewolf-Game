<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🐺 Werewolf</title>
<style>
*{box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#111;color:#fff;margin:0;padding:0;min-height:100vh}
#topbar{position:sticky;top:0;z-index:100;background:#111;border-bottom:1px solid #222;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;min-height:48px}
#topbar h3{margin:0;font-size:15px;opacity:.85}
#countdown-display{font-size:20px;font-weight:bold;color:#f90;min-width:60px;text-align:right}
#main{padding:16px;text-align:center;max-width:480px;margin:0 auto}
button{padding:14px 18px;margin:8px;font-size:16px;border-radius:10px;border:none;background:#444;color:white;cursor:pointer;transition:background .15s}
button:hover{background:#666}
button:active{background:#888}
button:disabled{opacity:.45;cursor:not-allowed}
.card{background:#1e1e1e;padding:20px;border-radius:14px;margin-top:16px}
.list button{display:block;width:100%;text-align:left}
.small{opacity:.7;font-size:14px}
.rolelist{margin-top:15px;text-align:left}
.mode-btn{padding:20px 28px;font-size:18px;margin:12px auto;border-radius:14px;background:#2a2a2a;border:2px solid #555;display:block;width:100%;max-width:320px}
.mode-btn:hover{background:#333;border-color:#aaa}
input{padding:12px;font-size:16px;border-radius:8px;border:1px solid #444;background:#252525;color:#fff;width:calc(100% - 16px);margin:6px 8px;display:block}
input:focus{outline:none;border-color:#888}
.code-display{font-size:48px;font-weight:bold;letter-spacing:8px;color:#f90;padding:16px 0;font-family:monospace}
.player-chip{display:inline-block;background:#2a2a2a;border-radius:20px;padding:6px 14px;margin:4px;font-size:14px}
.player-chip.host{border:1px solid #f90}
textarea{width:100%;min-height:200px;padding:12px;font-size:15px;border-radius:8px;border:1px solid #444;background:#252525;color:#fff;resize:vertical;font-family:inherit;line-height:1.5}
textarea:focus{outline:none;border-color:#888}
.vote-bar{background:#2a2a2a;border-radius:8px;margin:5px 0;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.voted-badge{background:#1a3a1a;color:#4f4;font-size:12px;padding:2px 8px;border-radius:12px;white-space:nowrap}
.action-bar{display:flex;gap:10px;margin-top:12px}
.action-bar button{flex:1;margin:0}
#notepad-overlay{display:none;position:fixed;inset:0;background:#111;z-index:200;overflow-y:auto;padding:16px;max-width:480px;margin:0 auto}
hr{border:none;border-top:1px solid #333;margin:16px 0}
.phase-label{font-size:12px;opacity:.5;text-transform:uppercase;letter-spacing:2px;margin:0 0 4px}
.night-waiting{background:#1a1a2a;border:1px solid #334;border-radius:10px;padding:16px;margin-top:12px;text-align:center}
.ping-dot{width:8px;height:8px;border-radius:50%;background:#4f4;display:inline-block;margin-right:6px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.number-row{display:flex;align-items:center;gap:8px;margin:8px 0}
.number-row label{flex:1;text-align:right;opacity:.8;font-size:15px}
.number-row input[type=number]{width:70px;flex:none;margin:0;display:inline-block;padding:8px;text-align:center}
.role-preview{background:#2a2a2a;border-radius:10px;padding:12px;margin-top:14px;text-align:left;font-size:14px}
.role-preview div{padding:3px 0;opacity:.85}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#333;padding:10px 18px;border-radius:20px;font-size:14px;z-index:999;pointer-events:none;transition:opacity .3s;white-space:nowrap}
</style>
</head>
<body>
<div id="topbar">
  <h3 id="topbar-title">🐺 Werewolf</h3>
  <span id="countdown-display"></span>
</div>
<div id="main"></div>

<div id="notepad-overlay">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;position:sticky;top:0;background:#111;padding:8px 0">
    <h2 style="margin:0">📓 My Notepad</h2>
    <button onclick="closeNotepad()" style="margin:0;padding:8px 14px;font-size:14px">✕ Close</button>
  </div>
  <p class="small">Your notes are private and persist between rounds.</p>
  <textarea id="notepad-text" placeholder="Write your notes here...&#10;&#10;Track suspects, confirmed roles, voting patterns..."></textarea>
  <button onclick="saveNotepad()" style="background:#2a3a2a;width:100%;margin-top:8px;font-size:16px">💾 Save Notes</button>
</div>

<script>
// ===================== STATE =====================
const app = document.getElementById('main')
const topbarTitle = document.getElementById('topbar-title')
const countdownEl = document.getElementById('countdown-display')
function render(h){ app.innerHTML = h }

// Local / pass-the-phone state
let players=[], roles={}, alive={}, deceased=[]
let wolfVotes={}, doctorChoice=null
let passQueue=[], currentAction=0
let skippedTurn={}, pendingSkip={}
let dousedPlayer=null, dousedNextMorning=false
let arsonistAlive=true, jesterVotedOut=false
let voteTimer=null

// Multiplayer state
let ws=null, myName=null, myRole=null, roomCode=null, isHost=false
let mpAlive={}, mpRoles={}, mpPlayers=[]
let mpNotepad='', mpPhase=null
let mpDayTimer=null, mpDaySeconds=120
let mpVotedFor=null, mpVoteCounts={}
let mpLivingPlayers=[]

// ===================== HELPERS =====================
function isEvil(p){ return roles[p]==='Werewolf'||roles[p]==='Arsonist' }
function isEvilRole(r){ return r==='Werewolf'||r==='Arsonist' }
function roleEmoji(r){
  const m={'Werewolf':'🐺','Arsonist':'🔥','Detective':'🔍','Doctor':'💊','Hunter':'🏹','King Tez':'👑','Jester':'🤡','Time Keeper':'⏳','Medium':'🔮','Ally':'🤝'}
  return m[r]||'👤'
}
function markDead(p){ if(alive[p]){alive[p]=false;deceased.push({name:p,role:roles[p]})} }
function shuffle(a){ return a.sort(()=>Math.random()-0.5) }
function setTopbar(title, time=null){
  topbarTitle.textContent = title
  if(time!==null){
    const m=Math.floor(time/60), s=time%60
    countdownEl.textContent=m+':'+(s<10?'0':'')+s
    countdownEl.style.color=time<=10?'#f33':'#f90'
  } else { countdownEl.textContent='' }
}

// ===================== LEADERBOARD =====================
function getLeaderboard(){ try{return JSON.parse(localStorage.getItem('ww_leaderboard')||'{}')}catch(e){return{}} }
function saveLeaderboard(lb){ localStorage.setItem('ww_leaderboard',JSON.stringify(lb)) }
function recordWins(names){ let lb=getLeaderboard(); names.forEach(n=>{lb[n]=(lb[n]||0)+1}); saveLeaderboard(lb) }
function resetLeaderboard(){ if(confirm('Reset the leaderboard? This cannot be undone.')){localStorage.removeItem('ww_leaderboard');showModeSelect()} }
function renderLeaderboard(){
  let lb=getLeaderboard(), entries=Object.entries(lb).sort((a,b)=>b[1]-a[1])
  if(!entries.length) return '<p class="small" style="opacity:.4">No games played yet.</p>'
  let medals=['🥇','🥈','🥉']
  return `<div style="text-align:left">${entries.map(([n,w],i)=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#252525;border-radius:8px;margin:4px 0">
      <span>${medals[i]||''} <b>${n}</b></span>
      <span style="background:#333;padding:2px 10px;border-radius:20px;font-weight:bold">${w} win${w!==1?'s':''}</span>
    </div>`).join('')}</div>`
}

// ===================== MODE SELECT =====================
function showModeSelect(){
  setTopbar('🐺 Werewolf')
  render(`
  <div class="card">
    <h2 style="margin-top:0">Choose Game Mode</h2>
    <button class="mode-btn" onclick="startSetup()">⚙️ Custom<br><span class="small" style="font-size:14px">Set your own role counts</span></button>
    <button class="mode-btn" onclick="startRandomSetup()">🎲 Random<br><span class="small" style="font-size:14px">Roles are randomly assigned</span></button>
    <button class="mode-btn" style="border-color:#4af;color:#8cf" onclick="showMultiplayerMenu()">🌐 Multiplayer<br><span class="small" style="font-size:14px">Everyone uses their own phone</span></button>
  </div>
  <div class="card">
    <h3 style="margin-top:0">🏆 Leaderboard</h3>
    ${renderLeaderboard()}
    <br>
    <button onclick="resetLeaderboard()" style="background:#2a1a1a;color:#f88;font-size:13px;padding:8px 14px">Reset Leaderboard</button>
  </div>`)
}

// ===================== MULTIPLAYER MENU =====================
function showMultiplayerMenu(){
  setTopbar('🌐 Multiplayer')
  render(`
  <div class="card">
    <h2 style="margin-top:0">🌐 Multiplayer</h2>
    <p class="small">No phone passing — everyone plays on their own device!</p>
    <button class="mode-btn" style="border-color:#4f4" onclick="showHostSetup()">🏠 Host a Game<br><span class="small" style="font-size:14px">Create a room for others to join</span></button>
    <button class="mode-btn" style="border-color:#4af" onclick="showJoinGame()">🔗 Join a Game<br><span class="small" style="font-size:14px">Enter the host's 6-digit code</span></button>
    <br>
    <button onclick="showModeSelect()" style="background:#333;font-size:14px;padding:10px;width:100%">← Back</button>
  </div>`)
}

// ===================== HOST SETUP =====================
let hostGameMode = 'custom'
let hostRoleConfig = { Werewolf:2, Detective:1, Doctor:1, Hunter:0, 'King Tez':0, Jester:0, 'Time Keeper':0, Arsonist:0, Medium:0, Ally:0 }

function showHostSetup(){
  setTopbar('🏠 Host Game')
  hostGameMode = 'custom'
  render(`
  <div class="card">
    <h2 style="margin-top:0">🏠 Host a Game</h2>
    <label style="display:block;text-align:left;margin-bottom:4px;opacity:.7;font-size:14px">Your name</label>
    <input id="host-name" placeholder="Enter your name" maxlength="20">
    <h3 style="text-align:left;margin-top:16px;margin-bottom:8px">Game Mode</h3>
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <button id="btn-custom" onclick="setHostMode('custom')" style="flex:1;background:#2a4a2a;border:2px solid #4f4">⚙️ Custom</button>
      <button id="btn-random" onclick="setHostMode('random')" style="flex:1;background:#333;border:2px solid transparent">🎲 Random</button>
    </div>
    <div id="role-config-section">
      <h3 style="text-align:left;margin:0 0 8px">Role Counts</h3>
      ${renderRoleInputsHost()}
    </div>
    <br>
    <button onclick="createRoom()" style="background:#2a4a2a;width:100%;font-size:18px;padding:16px;margin-top:4px">Create Room 🚀</button>
    <button onclick="showMultiplayerMenu()" style="background:#333;font-size:14px;padding:10px;width:100%;margin-top:4px">← Back</button>
  </div>`)
}

function renderRoleInputsHost(){
  const list=[['Werewolf','🐺'],['Detective','🔍'],['Doctor','💊'],['Hunter','🏹'],['King Tez','👑'],['Jester','🤡'],['Time Keeper','⏳'],['Arsonist','🔥'],['Medium','🔮'],['Ally','🤝']]
  return list.map(([r,e])=>`
    <div class="number-row">
      <label>${e} ${r}</label>
      <input type="number" id="rc-${r.replace(/ /g,'-')}" value="${hostRoleConfig[r]||0}" min="0" max="20">
    </div>`).join('')
}

function setHostMode(mode){
  hostGameMode = mode
  const c=document.getElementById('btn-custom'), r=document.getElementById('btn-random')
  c.style.background=mode==='custom'?'#2a4a2a':'#333'
  c.style.borderColor=mode==='custom'?'#4f4':'transparent'
  r.style.background=mode==='random'?'#2a4a2a':'#333'
  r.style.borderColor=mode==='random'?'#4f4':'transparent'
  document.getElementById('role-config-section').style.display=mode==='custom'?'block':'none'
}

function readHostRoleConfig(){
  const keys=['Werewolf','Detective','Doctor','Hunter','King Tez','Jester','Time Keeper','Arsonist','Medium','Ally']
  const cfg={}
  keys.forEach(r=>{
    const el=document.getElementById('rc-'+r.replace(/ /g,'-'))
    cfg[r]=el?parseInt(el.value)||0:0
  })
  return cfg
}

function createRoom(){
  const name=document.getElementById('host-name').value.trim()
  if(!name){alert('Enter your name');return}
  myName=name; isHost=true
  if(hostGameMode==='custom') hostRoleConfig=readHostRoleConfig()
  connectWS(()=>{
    ws.send(JSON.stringify({type:'create_room',name,gameMode:hostGameMode,roleConfig:hostRoleConfig}))
  })
}

// ===================== JOIN GAME =====================
function showJoinGame(){
  setTopbar('🔗 Join Game')
  render(`
  <div class="card">
    <h2 style="margin-top:0">🔗 Join a Game</h2>
    <label style="display:block;text-align:left;margin-bottom:4px;opacity:.7;font-size:14px">Your name</label>
    <input id="join-name" placeholder="Enter your name" maxlength="20">
    <label style="display:block;text-align:left;margin-bottom:4px;margin-top:12px;opacity:.7;font-size:14px">Room code</label>
    <input id="join-code" placeholder="______" maxlength="6" type="tel" inputmode="numeric"
      style="font-size:32px;letter-spacing:10px;text-align:center;font-family:monospace">
    <br>
    <button onclick="joinRoom()" style="background:#2a3a5a;width:100%;font-size:18px;padding:16px;margin-top:8px">Join Room →</button>
    <button onclick="showMultiplayerMenu()" style="background:#333;font-size:14px;padding:10px;width:100%;margin-top:4px">← Back</button>
  </div>`)
}

function joinRoom(){
  const name=document.getElementById('join-name').value.trim()
  const code=document.getElementById('join-code').value.trim()
  if(!name){alert('Enter your name');return}
  if(code.length!==6){alert('Enter a valid 6-digit code');return}
  myName=name; isHost=false
  connectWS(()=>{ ws.send(JSON.stringify({type:'join_room',name,code})) })
}

// ===================== WEBSOCKET =====================
// ⚠️ IMPORTANT: Replace the URL below with your actual WebSocket server address
// For local testing: ws://localhost:8080
// For production: wss://your-server.onrender.com  (or Railway, Fly.io, etc.)
const WS_URL = (()=>{
  const h=window.location.hostname
  if(h==='localhost'||h==='127.0.0.1') return 'ws://localhost:8080'
  return 'wss://werewolf-game-f5on.onrender.com'
})() 

function connectWS(onOpen){
  render(`<div class="card"><p>Connecting to server…</p><p class="small">${WS_URL}</p></div>`)
  try{ ws=new WebSocket(WS_URL) }
  catch(e){
    render(`<div class="card"><h2>Connection Failed</h2><p>Cannot connect to the multiplayer server.</p><p class="small">Make sure the server is running and WS_URL is configured in the HTML file.</p><button onclick="showModeSelect()">← Back</button></div>`)
    return
  }
  ws.onopen = onOpen
  ws.onerror = ()=>{
    render(`<div class="card"><h2>⚠️ Connection Error</h2><p>Could not reach the multiplayer server.</p><p class="small">Check that server.js is running and WS_URL is correct.</p><button onclick="showModeSelect()">← Back</button></div>`)
  }
  ws.onclose = ()=>{
    if(mpPhase&&mpPhase!=='ended'){
      render(`<div class="card"><h2>Disconnected</h2><p>Lost connection to the server.</p><button onclick="showModeSelect()">← Menu</button></div>`)
    }
  }
  ws.onmessage = e=>handleServerMsg(JSON.parse(e.data))
}

// ===================== SERVER MESSAGE HANDLER =====================
function handleServerMsg(msg){
  switch(msg.type){
    case 'room_created':
      roomCode=msg.code; mpPhase='lobby'; break
    case 'room_joined':
      roomCode=msg.code; mpPhase='lobby'; break
    case 'lobby_update':
      mpPlayers=msg.players; renderLobby(msg); break
    case 'error':
      alert(msg.message); break
    case 'game_start':
      myRole=msg.role
      mpPlayers.forEach(p=>mpAlive[p]=true)
      mpPhase='role_reveal'
      renderMyRole(msg); break
    case 'phase':
      mpPhase=msg.phase
      if(msg.phase==='night') renderNightWaiting()
      if(msg.phase==='voting'){ renderVotingPhase(msg) } break
    case 'night_action':
      renderNightAction(msg); break
    case 'detective_result':
      renderDetectiveResult(msg); break
    case 'morning':
      mpAlive=Object.assign({},msg.alive)
      renderMorning(msg); break
    case 'vote_update':
      updateVoteDisplay(msg); break
    case 'vote_result':
      if(mpDayTimer) clearInterval(mpDayTimer)
      if(msg.alive) mpAlive=Object.assign({},msg.alive)
      renderVoteResult(msg); break
    case 'hunter_shoot':
      renderHunterShoot(msg); break
    case 'hunter_result':
      if(msg.alive) mpAlive=Object.assign({},msg.alive)
      renderHunterResult(msg); break
    case 'game_end':
      if(mpDayTimer) clearInterval(mpDayTimer)
      mpPhase='ended'
      renderGameEnd(msg); break
    case 'player_left':
      showToast(`${msg.name} left the game`); break
    case 'notepad_saved':
      showToast('Notes saved ✓'); break
  }
}

// ===================== LOBBY =====================
function renderLobby(msg){
  const chips=msg.players.map(n=>`
    <span class="player-chip${n===msg.hostName?' host':''}">
      ${n===msg.hostName?'👑 ':''}${n}${n===myName?' (you)':''}
    </span>`).join('')
  const enoughPlayers=msg.players.length>=3
  const hostControls=isHost?`
    <hr>
    <p class="small" style="text-align:left">Mode: <b>${msg.gameMode==='random'?'🎲 Random':'⚙️ Custom'}</b></p>
    <button onclick="sendStartGame()" style="background:${enoughPlayers?'#2a4a2a':'#333'};width:100%;font-size:18px;padding:16px;margin-top:8px" ${enoughPlayers?'':'disabled'}>
      ${enoughPlayers?'▶ Start Game':'Need '+(3-msg.players.length)+' more player'+(3-msg.players.length!==1?'s':'')+'…'}
    </button>`
    :`<p class="small" style="margin-top:12px;opacity:.5">Waiting for the host to start…</p>`
  render(`
  <div class="card">
    <p class="phase-label">Lobby</p>
    <h2 style="margin:4px 0">Room Code</h2>
    <div class="code-display">${roomCode}</div>
    <p class="small">Share this code with other players</p>
    <hr>
    <h3 style="margin:8px 0">Players (${msg.players.length})</h3>
    <div style="margin:10px 0">${chips}</div>
    ${hostControls}
  </div>`)
}

function sendStartGame(){
  ws.send(JSON.stringify({type:'start_game'}))
}

// ===================== ROLE REVEAL =====================
function renderMyRole(msg){
  const r=msg.role
  let extra=''
  if(r==='Ally'||r==='Werewolf'){
    const wolves=(msg.extra?.wolves||[])
    extra=`<p class="small" style="margin-top:12px">🐺 Werewolves: <b>${wolves.length?wolves.join(', '):'None'}</b></p>`
    if(r==='Ally') extra+=`<p class="small">You look like a Villager to the Detective. Win with the Werewolves.</p>`
  }
  render(`
  <div class="card">
    <p class="phase-label">Your Secret Role</p>
    <div style="font-size:72px;margin:16px 0">${roleEmoji(r)}</div>
    <h1 style="margin:0 0 8px">${r}</h1>
    ${extra}
    <hr>
    <p class="small">Keep your screen private after reading!</p>
    <button onclick="confirmRoleSeen()" style="background:#2a4a2a;width:100%;margin-top:8px;font-size:16px">✓ I've seen my role</button>
  </div>`)
}

function confirmRoleSeen(){
  render(`<div class="card"><div class="night-waiting"><span class="ping-dot"></span>Waiting for all players to confirm…</div></div>`)
  ws.send(JSON.stringify({type:'role_seen'}))
}

// ===================== NIGHT =====================
function renderNightWaiting(){
  render(`<div class="card"><h2>🌙 Night Falls</h2><div class="night-waiting"><span class="ping-dot"></span>Waiting for your night action…</div></div>`)
}

function renderNightAction(msg){
  mpPhase='night'
  switch(msg.action){
    case 'dead':
      render(`<div class="card"><h2>💀 You are eliminated</h2><p class="small">Spectate and use your notepad.</p>
        <button onclick="openNotepad()" style="background:#2a2a2a">📓 Notepad</button></div>`)
      break
    case 'skipped':
      render(`<div class="card"><h2>⏳ Skipped!</h2><p>The Time Keeper has taken your action — you miss this night.</p>
        <button onclick="ws.send(JSON.stringify({type:'night_done',action:'villager',target:null}))">Continue</button></div>`)
      break
    case 'villager':
      render(`<div class="card"><h2>🌙 Sleep tight…</h2><p>No action tonight. Stay quiet and wait.</p>
        <button onclick="nightDone('villager',null)">✓ Done</button>
        <button onclick="openNotepad()" style="background:#2a2a2a">📓 Notepad</button></div>`)
      break
    case 'wolf':
      render(`<div class="card"><h2>🐺 Werewolf</h2>
        ${msg.allies.length?`<p class="small">😈 Evil team: <b>${msg.allies.join(', ')}</b></p>`:`<p class="small">No evil allies alive.</p>`}
        <p>Choose someone to eliminate tonight:</p>
        <div class="list">${msg.targets.map(t=>`<button onclick="nightDone('wolf','${t}')">Kill ${t}</button>`).join('')}</div>
      </div>`)
      break
    case 'arsonist':
      render(`<div class="card"><h2>🔥 Arsonist</h2>
        ${msg.allies.length?`<p class="small">🐺 Evil allies: <b>${msg.allies.join(', ')}</b></p>`:`<p class="small">No evil allies alive.</p>`}
        ${msg.dousedPlayer
          ?`<p style="color:#fa0">🔥 <b>${msg.dousedPlayer}</b> is doused — they burn tomorrow morning.</p><p class="small">You can't douse another until they burn.</p><button onclick="nightDone('arsonist',null)">Continue</button>`
          :`<p>Douse someone in gasoline:</p><div class="list">${msg.targets.map(t=>`<button onclick="nightDone('arsonist','${t}')">Douse ${t}</button>`).join('')}</div>`}
      </div>`)
      break
    case 'ally':
      render(`<div class="card"><h2>🤝 Ally</h2>
        <p class="small">You are secretly allied with the Werewolves.</p>
        <p>Living Werewolves: <b>${msg.wolves.length?msg.wolves.join(', '):'None alive'}</b></p>
        <button onclick="nightDone('ally',null)">Continue</button></div>`)
      break
    case 'detective':
      render(`<div class="card"><h2>🔍 Detective</h2>
        <p>Investigate a player — are they a Villager?</p>
        <div class="list">${msg.targets.map(t=>`<button onclick="detectiveInvestigate('${t}')">Investigate ${t}</button>`).join('')}</div>
      </div>`)
      break
    case 'doctor':
      render(`<div class="card"><h2>💊 Doctor</h2>
        <p>Protect one player from being killed tonight:</p>
        <div class="list">${msg.targets.map(t=>`<button onclick="nightDone('doctor','${t}')">Protect ${t}</button>`).join('')}</div>

    case 'timekeeper':
      render(`<div class="card"><h2>⏳ Time Keeper</h2>
        <p>Choose a player to skip their next night action:</p>
        <div class="list">${msg.targets.map(t=>`<button onclick="nightDone('timekeeper','${t}')">Skip ${t}</button>`).join('')}</div>

    case 'medium':

        ?msg.deceased.map(d=>`<div style="background:#252525;padding:10px;border-radius:8px;margin:5px 0;display:flex;justify-content:space-between"><span>💀 ${d.name}</span><span>${roleEmoji(d.role)} ${d.role}</span></div>`).join('')

    const r=msg.roles[p]

    if(r==='Ally') return winner==='evil'

  let title,subtitle,titleColor
  if(winner==='jester'){title='🤡 Jester Wins!';subtitle='The village voted out the Jester — fooled again!';titleColor='#f0c'}

  else{title='🎉 Village Wins!';subtitle='The evil has been defeated!';titleColor='#4f4'}

  const allPlayers=Object.keys(msg.roles)
  recordWins(allPlayers.filter(p=>playerWon(p)))

  const rows=allPlayers.map(p=>{

    const nameColor=isEvilRole(r)?'color:#f88':r==='Ally'?'color:#fa0':r==='Jester'?'color:#f0c':'color:#8cf'

// ===================== PASS-THE-PHONE MODES (unchanged logic) =====================
function buildRandomRolePool(n){
  let pool=[]
  if(n<=6){pool.push(Math.random()<0.5?'Werewolf':'Arsonist')}
  else{let r=Math.random();if(r<0.50)pool.push('Werewolf');else if(r<0.75)pool.push('Werewolf','Arsonist');else pool.push('Werewolf','Werewolf')}
  pool.push('Detective')
  let opt=shuffle(['Doctor','Hunter','Jester','Time Keeper','Medium'])
  let extra=n<=5?0:n<=7?1:2
  for(let i=0;i<extra;i++)if(opt[i])pool.push(opt[i])
  while(pool.length<n)pool.push('Villager')
  let evilCount=pool.filter(r=>r==='Werewolf'||r==='Arsonist').length
  if(evilCount===1){let vi=pool.map((r,i)=>r==='Villager'?i:-1).filter(i=>i>=0);shuffle(vi);if(vi.length>0&&Math.random()<0.20)pool[vi[0]]='Ally'}
  return pool
}

function startGame(){
  const get=id=>parseInt(document.getElementById(id).value)||0
  let rolePool=[]
  const counts=[['wolfCount','Werewolf'],['detectiveCount','Detective'],['doctorCount','Doctor'],['hunterCount','Hunter'],['kingCount','King Tez'],['jesterCount','Jester'],['timekeeperCount','Time Keeper'],['arsonistCount','Arsonist'],['mediumCount','Medium'],['allyCount','Ally']]
  counts.forEach(([id,r])=>{ for(let i=0;i<get(id);i++)rolePool.push(r) })
  if(rolePool.length>players.length){alert('Too many roles for players');return}
  while(rolePool.length<players.length)rolePool.push('Villager')
  wolfVotes={};doctorChoice=null;passQueue=[];currentAction=0
  skippedTurn={};pendingSkip={};dousedPlayer=null;dousedNextMorning=false
  arsonistAlive=true;deceased=[];jesterVotedOut=false

  }
  render(`<div class="card"><h2>Your Role</h2><div style="font-size:64px">${roleEmoji(roles[p])}</div><h1>${roles[p]}</h1>${extra}<button onclick="hideRole_local(${i})">Hide Role</button></div>`)

  render(`<div class="card"><h2>Pass phone to <b>${next}</b></h2><button onclick="roleReveal(${i+1})">Continue</button></div>`)

function startNight_local(){
  wolfVotes={};passQueue=[]
  skippedTurn=Object.assign({},pendingSkip);pendingSkip={}
  players.forEach(p=>{
    if(!alive[p])return
    const t=roles[p]
    if(t==='Werewolf')passQueue.push({type:'wolf',player:p})
    else if(t==='Arsonist')passQueue.push({type:'arsonist',player:p})
    else if(t==='Ally')passQueue.push({type:'ally',player:p})
    else if(t==='Detective')passQueue.push({type:'detective',player:p})
    else if(t==='Doctor')passQueue.push({type:'doctor',player:p})
    else if(t==='Time Keeper')passQueue.push({type:'timekeeper',player:p})
    else if(t==='Medium')passQueue.push({type:'medium',player:p})
    else passQueue.push({type:'villager',player:p})
  })
  currentAction=0
  render(`<div class="card"><h2>🌙 Night</h2><button onclick="nextNightAction_local()">Start Night</button></div>`)
}

function nextNightAction_local(){
  if(currentAction>=passQueue.length){resolveNight_local();return}
  const action=passQueue[currentAction]
  render(`<div class="card"><h2>Pass phone to <b>${action.player}</b></h2><button onclick="runNightAction_local()">Continue</button></div>`)
}

function runNightAction_local(){
  const action=passQueue[currentAction]
  if(skippedTurn[action.player]){
    delete skippedTurn[action.player]
    render(`<div class="card"><h2>⏳ Time Keeper took your time</h2><p>You miss your action tonight.</p><button onclick="finishAction_local()">Continue</button></div>`)
    return
  }
  const t=action.type, p=action.player
  if(t==='wolf')wolfUI_local(p)
  else if(t==='arsonist')arsonistUI_local(p)
  else if(t==='ally')allyUI_local(p)
  else if(t==='detective')detectiveUI_local(p)
  else if(t==='doctor')doctorUI_local()
  else if(t==='timekeeper')timekeeperUI_local(p)
  else if(t==='medium')mediumUI_local()
  else render(`<div class="card"><p>No action tonight.</p><button onclick="finishAction_local()">Continue</button></div>`)
}

function finishAction_local(){currentAction++;nextNightAction_local()}

function wolfUI_local(wolf){
  const targets=players.filter(p=>alive[p]&&!isEvil(p))
  const allies=players.filter(p=>alive[p]&&p!==wolf&&isEvil(p))
  render(`<div class="card"><h2>🐺 Werewolf</h2>
    ${allies.length?`<p class="small">😈 Evil team: <b>${allies.join(', ')}</b></p>`:`<p class="small">No evil allies alive.</p>`}
    <div class="list">${targets.map(t=>`<button onclick="wolfVote_local('${wolf}','${t}')">Kill ${t}</button>`).join('')}</div>
  </div>`)
}
function wolfVote_local(wolf,target){wolfVotes[wolf]=target;finishAction_local()}

function arsonistUI_local(p){
  const allies=players.filter(x=>alive[x]&&(roles[x]==='Werewolf'||(roles[x]==='Arsonist'&&x!==p)))
  const targets=players.filter(x=>alive[x])
  render(`<div class="card"><h2>🔥 Arsonist</h2>
    ${allies.length?`<p class="small">🐺 Evil allies: <b>${allies.join(', ')}</b></p>`:`<p class="small">No evil allies alive.</p>`}
    ${dousedPlayer
      ?`<p style="color:#fa0">🔥 ${dousedPlayer} is already doused — they burn tomorrow morning.</p><button onclick="finishAction_local()">Continue</button>`
      :`<p>Douse someone:</p><div class="list">${targets.map(t=>`<button onclick="douse_local('${t}')">${t}</button>`).join('')}</div>`}
  </div>`)
}

function allyUI_local(p){
  const wolves=players.filter(x=>alive[x]&&roles[x]==='Werewolf')
  render(`<div class="card"><h2>🤝 Ally</h2><p class="small">You are secretly allied with the Werewolves.</p><p>Living Werewolves: <b>${wolves.length?wolves.join(', '):'None alive'}</b></p><button onclick="finishAction_local()">Continue</button></div>`)
}

function detectiveUI_local(p){
  const targets=players.filter(x=>x!==p&&alive[x])
  render(`<div class="card"><h2>🔍 Detective</h2><div class="list">${targets.map(t=>`<button onclick="detect_local('${t}')">Investigate ${t}</button>`).join('')}</div></div>`)
}
function detect_local(target){
  const r=roles[target],result=(r==='Villager'||r==='Ally')?'a Villager':'NOT a Villager'
  render(`<div class="card"><h2>Investigation Result</h2><p>${target} is <b>${result}</b></p><button onclick="finishAction_local()">Continue</button></div>`)
}

function doctorUI_local(){
  const targets=players.filter(x=>alive[x])
  render(`<div class="card"><h2>💊 Doctor</h2><div class="list">${targets.map(t=>`<button onclick="doctorSave_local('${t}')">Protect ${t}</button>`).join('')}</div></div>`)
}
function doctorSave_local(t){doctorChoice=t;finishAction_local()}

function timekeeperUI_local(p){
  const targets=players.filter(x=>x!==p&&alive[x])
  render(`<div class="card"><h2>⏳ Time Keeper</h2><p>Skip a player's next night action:</p><div class="list">${targets.map(t=>`<button onclick="freeze_local('${t}')">${t}</button>`).join('')}</div></div>`)
}
function freeze_local(target){pendingSkip[target]=true;finishAction_local()}

function mediumUI_local(){
  if(!deceased.length){render(`<div class="card"><h2>🔮 Medium</h2><p>No one has died yet.</p><button onclick="finishAction_local()">Continue</button></div>`);return}
  const rows=deceased.map(d=>`<div style="background:#252525;padding:10px 14px;border-radius:8px;margin:5px 0;display:flex;justify-content:space-between"><span>💀 ${d.name}</span><span>${roleEmoji(d.role)} ${d.role}</span></div>`).join('')
  render(`<div class="card"><h2>🔮 Medium</h2><p class="small">The spirits speak…</p>${rows}<button onclick="finishAction_local()" style="margin-top:14px">Continue</button></div>`)
}

function resolveNight_local(){
  const votes=Object.values(wolfVotes)
  let victim=null
  if(votes.length){
    const counts={};votes.forEach(v=>counts[v]=(counts[v]||0)+1)
    const max=Math.max(...Object.values(counts))
    const leaders=Object.keys(counts).filter(p=>counts[p]===max)
    victim=leaders[Math.floor(Math.random()*leaders.length)]
  }
  let msgs=[]
  if(!victim)msgs.push('No one was attacked by the Werewolves.')
  else if(victim===doctorChoice)msgs.push(victim+' was attacked but saved by the Doctor.')
  else{markDead(victim);msgs.push(victim+' was killed during the night.')}
  let burnMsg=''
  if(dousedNextMorning&&dousedPlayer&&arsonistAlive){
    if(alive[dousedPlayer]){markDead(dousedPlayer);burnMsg=`<p style="color:#f74;font-weight:bold">🔥 ${dousedPlayer} burned to death!</p>`}
    dousedPlayer=null;dousedNextMorning=false
  }else if(dousedPlayer&&arsonistAlive){dousedNextMorning=true;burnMsg=`<p style="color:#fa0" class="small">🔥 ${dousedPlayer} smells like gasoline…</p>`}
  doctorChoice=null
  if(checkWinCondition_local())return
  render(`<div class="card"><h2>🌅 Morning</h2><p>${msgs.join(' ')}</p>${burnMsg}<button onclick="startVoting_local()">Continue</button></div>`)
}

function checkWinCondition_local(){
  const living=players.filter(p=>alive[p])
  const evilAlive=living.filter(p=>isEvil(p))
  const goodAlive=living.filter(p=>!isEvil(p))
  if(evilAlive.length>0&&evilAlive.length>=goodAlive.length){showEndScreen_local('evil');return true}
  if(evilAlive.length===0){showEndScreen_local('good');return true}
  return false
}

function showEndScreen_local(winner){
  clearInterval(voteTimer)
  function playerWon(p){
    if(roles[p]==='Jester')return winner==='jester'&&jesterVotedOut
    if(roles[p]==='Ally')return winner==='evil'
    if(isEvil(p))return winner==='evil'
    return winner==='good'
  }
  let title,subtitle,titleColor
  if(winner==='jester'){title='🤡 Jester Wins!';subtitle='The village voted out the Jester — fooled again!';titleColor='#f0c'}
  else if(winner==='evil'){title='😈 Evil Wins!';subtitle='The werewolves have taken over.';titleColor='#f44'}
  else{title='🎉 Village Wins!';subtitle='The evil has been defeated!';titleColor='#4f4'}
  recordWins(players.filter(p=>playerWon(p)))
  const rows=players.map(p=>{
    const isA=alive[p],won=playerWon(p),r=roles[p]
    const nameColor=isEvil(p)?'color:#f88':r==='Ally'?'color:#fa0':r==='Jester'?'color:#f0c':'color:#8cf'
    const bg=isA?(isEvil(p)?'background:#2a1a1a':r==='Ally'?'background:#2a2200':r==='Jester'?'background:#2a0020':'background:#1a2a1a'):'background:#222'
    const badge=won?`<span style="font-size:12px;background:#333;padding:2px 7px;border-radius:6px;margin-left:6px">🏆 Won</span>`:`<span style="font-size:12px;background:#333;padding:2px 7px;border-radius:6px;margin-left:6px;opacity:.45">Lost</span>`
    return `<div style="${bg};padding:10px 14px;border-radius:8px;margin:5px 0;display:flex;justify-content:space-between;align-items:center"><span style="${nameColor};font-weight:bold">${isA?'✅':'💀'} ${p}${badge}</span><span>${roleEmoji(r)} ${r}</span></div>`
  }).join('')
  render(`<div class="card"><h1 style="color:${titleColor};margin-bottom:4px">${title}</h1><p style="opacity:.75;margin-top:0">${subtitle}</p><hr><h3>All Players</h3><div style="text-align:left">${rows}</div><br><button onclick="showModeSelect()">Play Again</button></div>`)
}

function startVoting_local(){
  const living=players.filter(p=>alive[p])
  let secondsLeft=120
  render(`<div class="card"><h2>🗳 Voting Phase</h2><p id="voteCountdown" style="font-size:28px;font-weight:bold;color:#f90">2:00</p>
    <p class="small">Vote out the player you think is evil</p>
    <div class="list">${living.map(p=>`<button onclick="confirmVote_local('${p}')">${p}</button>`).join('')}
    <button onclick="skipVote_local()">Skip Vote</button></div>
  </div>`)
  voteTimer=setInterval(()=>{
    secondsLeft--
    const el=document.getElementById('voteCountdown')
    if(el){const m=Math.floor(secondsLeft/60),s=secondsLeft%60;el.textContent=m+':'+(s<10?'0':'')+s;if(secondsLeft<=10)el.style.color='#f33'}
    if(secondsLeft<=0){clearInterval(voteTimer);render(`<div class="card"><h2>⏱ Time's Up</h2><p>No one was voted out.</p><button onclick="startNight_local()">Continue</button></div>`)}
  },1000)
}

function confirmVote_local(p){
  clearInterval(voteTimer)
  render(`<div class="card"><h2>🗳 Confirm Vote</h2><p>Vote out <b>${p}</b>?</p>
    <button onclick="voteOut_local('${p}')" style="background:#8b0000;font-size:18px;padding:16px 28px">✅ Yes, vote out ${p}</button><br>
    <button onclick="startVoting_local()" style="background:#333">← Go back</button></div>`)
}

function voteOut_local(p){
  clearInterval(voteTimer)
  markDead(p)
  if(roles[p]==='Arsonist'){arsonistAlive=false;dousedPlayer=null;dousedNextMorning=false}
  if(roles[p]==='Jester'){jesterVotedOut=true;showEndScreen_local('jester');return}
  if(roles[p]==='Hunter'){hunterShoot_local(p);return}
  if(checkWinCondition_local())return
  render(`<div class="card"><h2>${p} was voted out</h2><p>They were <b>${roleEmoji(roles[p])} ${roles[p]}</b></p><button onclick="startNight_local()">Continue</button></div>`)
}

function skipVote_local(){
  clearInterval(voteTimer)
  render(`<div class="card"><h2>No one was voted out</h2><button onclick="startNight_local()">Continue</button></div>`)
}

function hunterShoot_local(hunter){
  const targets=players.filter(p=>alive[p])
  render(`<div class="card"><h2>🏹 Hunter's Last Shot</h2><p><b>${hunter}</b> was voted out but gets one final shot!</p>
    <div class="list">${targets.map(t=>`<button onclick="hunterPick_local('${hunter}','${t}')">${t}</button>`).join('')}</div></div>`)
}

function hunterPick_local(hunter,target){
  if(isEvil(target)){
    markDead(target)
    if(roles[target]==='Arsonist'){arsonistAlive=false;dousedPlayer=null;dousedNextMorning=false}
    if(checkWinCondition_local())return
    render(`<div class="card"><h2>💥 Hunter takes one down!</h2><p>${hunter} took <b>${target}</b> (${roleEmoji(roles[target])} ${roles[target]}) down!</p><button onclick="startNight_local()">Continue</button></div>`)
  }else{
    render(`<div class="card"><h2>🏹 Hunter's shot missed!</h2><p>${hunter} shot <b>${target}</b> — they were innocent.</p><button onclick="startNight_local()">Continue</button></div>`)
  }
}

// ===================== INIT =====================
showModeSelect()
</script>
</body>
</html>
